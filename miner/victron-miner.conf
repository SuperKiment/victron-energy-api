# ============================================================
# victron-miner.conf — Configuration du mineur solaire
# ============================================================

# --- API Victron (votre serveur Express) ---
VICTRON_API_URL="http://192.168.1.XX:3000"   # Adresse de votre serveur Express

# --- Conditions de démarrage du minage ---
# Le minage démarre si l'UNE de ces conditions est vraie :

# 1. Batterie à 100% (on a tout ce qu'il faut, le surplus part au réseau)
BATTERY_SOC_THRESHOLD=100

# 2. Energie exportée vers EDF (en W, positif = injection réseau)
#    Ex : 50 → démarre si on injecte plus de 50W dans le réseau
GRID_EXPORT_THRESHOLD=50

# 3. (optionnel) SOC minimum pour autoriser le minage même sans export
#    Met à 101 pour désactiver cette condition
BATTERY_SOC_MIN_TO_MINE=98

# --- Intervalle de vérification (secondes) ---
CHECK_INTERVAL=600    # 600s = 10 minutes

# --- Pool de minage ---
# Monero (XMR) — anonyme, CPU+GPU efficace, pas besoin de compte
# Inscrivez-vous sur https://www.xmrpool.eu/ ou https://supportxmr.com/
POOL_URL="pool.supportxmr.com:3333"
WALLET_ADDRESS="VOTRE_ADRESSE_XMR_ICI"   # Adresse Monero (XMR)
WORKER_NAME="laptop-solaire"

# --- Chemins des mineurs ---
# Téléchargez et extrayez dans ces dossiers :
# XMRig  : https://github.com/xmrig/xmrig/releases
# T-Rex  : https://github.com/trexminer/T-Rex/releases
XMRIG_BIN="/opt/miners/xmrig/xmrig"
TREX_BIN="/opt/miners/trex/t-rex"

# --- Limites de ressources ---
# Threads CPU pour XMRig (0 = auto, détecté automatiquement)
CPU_THREADS=0

# Limite GPU T-Rex en % (100 = pleine puissance)
GPU_INTENSITY=100

# --- Fichiers de contrôle ---
LOG_FILE="/var/log/victron-miner/miner.log"
PID_FILE_XMRIG="/tmp/xmrig.pid"
PID_FILE_TREX="/tmp/trex.pid"
STATE_FILE="/tmp/victron-miner.state"    # "mining" ou "idle"
